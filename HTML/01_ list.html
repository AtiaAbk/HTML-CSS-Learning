<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>
<body>
    <h1>Type of List</h1>
    <div>
        <h4>unordered List</h4>
        <ul>
            <li>Orange</li>
            <li>Orange</li>
            <li>Orange</li>
            <li>Orange</li>
        </ul>
    </div>

    <div>
        <h4>ordered List</h4>
        <ol>
            <li>Orange</li>
            <li>Orange</li>
            <li>Orange</li>
        </ol>
    </div>

    <div>
        <h5>block Element</h5>
            <ul>
                <li>h1 to h6</li>
                <li>ul</li>
                <li>ol</li>
                <li>p</li>
            </ul>
    </div>
    <div>
        <h5>inline Element</h5>
        <ul>
            <li>img</li>
            <li>a</li>
            <li>em</li>
        </ul>
    </div>
