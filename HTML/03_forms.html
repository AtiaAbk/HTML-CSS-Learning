<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h2>Login Form</h2>
    <form>
        <lable>
            <strong>Email:</strong>
            <br>
            <input type="email" name="email" id="">
        </lable>
        <br>
        <label for="pass">
            Password: 
            <br>
            <input type="password" name="pass" id="">
        </label>
        <br>
        <button type="submit">Login</button>
        
    </form>


    <h3><em>Information Form</em></h3>
    <form action="">
        <div>
            <label for="name">
                Name: <input type="text">
            </label>
        </div>
        <div>
            <label for="email">
                Email: <input type="email" name="email" id="">
            </label>
        </div>
        <div>
            <label for="age">
                Age: <input type="number" name="age" id="">
            </label>
        </div>
        <div>
            <label for="sex">
                Sex: <input type="radio" name="sex" id="">Male <input type="radio" name="sex" id="">Female
            </label>
        </div>
        <div>
            <label for="hobby">
                Hobby: <input type="checkbox" name="" id="">Music <input type="checkbox" name="" id="">dancing <input type="checkbox" name="" id="">Travelling
            </label>
        </div>
        <div>
            <label for="">
                Date of Birth: <input type="date" name="" id="">
            </label>
        </div>
        <div>
            <label>
                Faviorite Color: <input type="color" name="" id="">
            </label>
        </div>
        <div>
            <label for="">
                Profile Pic: <input type="file" name="" id="">
            </label>
        </div>
        <div>
            <lable>
                Mobile: <input type="tel" name="" id="">
            </lable>
        </div>
        <div>
            <lable>
                Region: <select name="" id="">
                    <option value="BD">BD</option>
                    <option value="India">India</option>
                </select>
            </lable>
        </div>
        <button type="submit">Submit Form</button>
    </form>
</body>
</html>
